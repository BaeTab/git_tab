name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore GitTab.sln

      - name: Format check
        run: dotnet format GitTab.sln --verify-no-changes --severity error

      - name: Build
        run: dotnet build GitTab.sln -c Release --no-restore

      - name: Test
        run: dotnet test GitTab.sln -c Release --no-build --verbosity normal
