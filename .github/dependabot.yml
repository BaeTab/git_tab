version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dotnet:
        patterns: ["*"]
    ignore:
      # FluentAssertions 8+ is under a paid commercial license; this project is OSS-only,
      # so we stay pinned on the last MIT-licensed line (6.x).
      - dependency-name: "FluentAssertions"
        update-types: ["version-update:semver-major"]
      # The app targets net8.0 — keep the Microsoft.Extensions / Serilog.Extensions.Logging stack on
      # the 8.x line instead of pulling in .NET 9/10 assemblies. Explicit names + a hard version bound
      # (>=9.0.0), because the wildcard + semver-major form let 10.x slip through a grouped update.
      - dependency-name: "Microsoft.Extensions.*"
        versions: [">=9.0.0"]
      - dependency-name: "Microsoft.Extensions.DependencyInjection"
        versions: [">=9.0.0"]
      - dependency-name: "Microsoft.Extensions.Logging"
        versions: [">=9.0.0"]
      - dependency-name: "Microsoft.Extensions.Logging.Abstractions"
        versions: [">=9.0.0"]
      - dependency-name: "Serilog.Extensions.Logging"
        versions: [">=9.0.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
